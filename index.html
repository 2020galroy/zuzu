<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>זוזו — לומדה</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f0f4ff;
  color: #1a1a2e;
  font-family: Arial, sans-serif;
  font-size: 17px;
  text-align: center;
  min-height: 100vh;
}

/* ── מסך פתיחה ── */
#screen-welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  background: linear-gradient(160deg, #fff9f0 0%, #f0f4ff 100%);
}

.zuzu-logo {
  font-size: 64px;
  font-weight: 900;
  letter-spacing: 6px;
  color: #e74c3c;
  text-shadow: 3px 3px 0 #f5a623;
  margin-bottom: 6px;
}

.zuzu-tagline {
  color: #888;
  font-size: 15px;
  margin-bottom: 36px;
  font-style: italic;
}

.welcome-card {
  background: #fff;
  border: none;
  border-radius: 24px;
  padding: 36px 32px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.10);
}

.welcome-card h2 {
  font-size: 22px;
  margin-bottom: 28px;
  color: #1a1a2e;
}

.input-group {
  margin-bottom: 20px;
  text-align: right;
}

.input-group label {
  display: block;
  font-size: 14px;
  color: #666;
  margin-bottom: 8px;
  font-weight: bold;
}

.input-group input {
  width: 100%;
  padding: 14px 16px;
  background: #f8f8f8;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  color: #1a1a2e;
  font-size: 17px;
  text-align: right;
  outline: none;
  transition: border-color 0.2s;
}

.input-group input:focus {
  border-color: #f5a623;
  background: #fff;
}

.age-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 28px;
}

.age-btn {
  flex: 1;
  padding: 14px 8px;
  background: #f8f8f8;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  color: #666;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.15s;
}

.age-btn:hover { border-color: #bbb; color: #333; background: #f0f0f0; }

.age-btn.selected { font-weight: bold; }
.age-btn.easy.selected   { border-color: #2ecc71; background: #eafaf1; color: #1a8a47; }
.age-btn.medium.selected { border-color: #f5a623; background: #fff8ee; color: #b07010; }
.age-btn.hard.selected   { border-color: #e74c3c; background: #fef0ef; color: #c0392b; }

.start-btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #f5a623, #e74c3c);
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(245,166,35,0.35);
  letter-spacing: 1px;
}

.start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,166,35,0.45); }
.start-btn:disabled { background: #ddd; color: #aaa; cursor: default; box-shadow: none; transform: none; }

/* ── מסך הלומדה ── */
#screen-episode {
  display: none;
  padding: 16px 10px;
  background: #f0f4ff;
  min-height: 100vh;
}

.episode-header {
  margin-bottom: 16px;
  background: #fff;
  border-radius: 16px;
  padding: 12px 16px;
  max-width: 720px;
  margin: 0 auto 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.episode-header h1 {
  font-size: 20px;
  color: #1a1a2e;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

@media (max-width: 600px) {
  .episode-header h1 { font-size: 17px; }
  .episode-subtitle { font-size: 11px; }
  .player-badge { font-size: 12px; padding: 4px 10px; }
  #screen-episode { padding: 8px 6px; }
}

.episode-subtitle {
  color: #888;
  font-size: 13px;
  margin-top: 2px;
}

.player-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  white-space: nowrap;
}

#episode-content { }
</style>
</head>
<body>

<!-- מסך פתיחה -->
<div id="screen-welcome">
  <img src="zuzu.png" alt="זוזו" style="width:260px;max-width:80vw;margin-bottom:4px;">
  <div class="zuzu-tagline">מגלים את המדע שמסביבנו 🚀</div>

  <div class="welcome-card">
    <h2>מי משחק? 👋</h2>

    <div class="input-group">
      <label>השם שלי</label>
      <input type="text" id="input-name" placeholder="למשל: דןדן" maxlength="20">
    </div>

    <div class="input-group">
      <label>כמה אני בן/בת?</label>
      <div class="age-buttons">
        <button class="age-btn easy"   onclick="selectAge(this, 6)"  >🟢 5–7</button>
        <button class="age-btn medium" onclick="selectAge(this, 9)"  >🟡 8–10</button>
        <button class="age-btn hard"   onclick="selectAge(this, 12)" >🔴 11–14</button>
      </div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startEpisode()" disabled>
      יאללה נתחיל! 🏎️
    </button>
  </div>
</div>

<!-- מסך הפרק — נטען דינמית -->
<div id="screen-episode">
  <div class="episode-header">
    <div style="text-align:right">
      <h1 id="ep-title"></h1>
      <div class="episode-subtitle" id="ep-subtitle"></div>
    </div>
    <div class="player-badge" id="player-badge"></div>
  </div>
  <div id="episode-content"></div>
</div>

<script>
let playerName = '';
let playerAge  = 0;

function selectAge(btn, age) {
  document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  playerAge = age;
  checkReady();
}

document.getElementById('input-name').addEventListener('input', checkReady);

function checkReady() {
  const name = document.getElementById('input-name').value.trim();
  document.getElementById('start-btn').disabled = !(name.length > 0 && playerAge > 0);
}

function startEpisode() {
  playerName = document.getElementById('input-name').value.trim();

  localStorage.setItem('zuzu_player', JSON.stringify({
    name: playerName, age: playerAge, lastVisit: new Date().toISOString()
  }));

  document.getElementById('screen-welcome').style.display = 'none';
  document.getElementById('screen-episode').style.display  = 'block';

  document.getElementById('ep-title').textContent    = EPISODE_CONFIG.title;
  document.getElementById('ep-subtitle').textContent = EPISODE_CONFIG.subtitle;

  const badge = document.getElementById('player-badge');
  badge.textContent = '👤 ' + playerName;
  badge.style.background = EPISODE_CONFIG.color + '22';
  badge.style.border      = '1px solid ' + EPISODE_CONFIG.color;
  badge.style.color       = EPISODE_CONFIG.color;

  loadSimulator();
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('zuzu_player');
  if (saved) {
    const p = JSON.parse(saved);
    document.getElementById('input-name').value = p.name;
    checkReady();
  }
});
</script>

<script src="episodes/01-f1-senna/config.js"></script>
<script src="episodes/01-f1-senna/questions.js"></script>
<script src="episodes/01-f1-senna/simulator.js"></script>

</body>
</html>
